<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Java & Android – All Slips</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #00d4ff;
    --green: #00e676;
    --orange: #ff9800;
    --text: #e8eaf6;
    --muted: #8892b0;
    --code-bg: #0d1117;
    --radius: 12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    line-height:1.6;
  }

  /* ── TOP NAV ── */
  #topbar{
    position:sticky;top:0;z-index:100;
    background:rgba(15,17,23,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:0 24px;
    display:flex;align-items:center;gap:16px;
    height:58px;
  }
  #topbar h1{
    font-size:1.1rem;font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    white-space:nowrap;
  }
  #search{
    flex:1;max-width:340px;
    background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;padding:7px 14px;
    color:var(--text);font-size:.9rem;outline:none;
    transition:border-color .2s;
  }
  #search:focus{border-color:var(--accent);}
  #search::placeholder{color:var(--muted);}

  /* ── SIDEBAR ── */
  #layout{display:flex;min-height:calc(100vh - 58px);}
  #sidebar{
    width:220px;flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--border);
    padding:16px 0;
    position:sticky;top:58px;
    height:calc(100vh - 58px);
    overflow-y:auto;
  }
  #sidebar::-webkit-scrollbar{width:4px;}
  #sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .sb-label{
    font-size:.68rem;font-weight:700;letter-spacing:.12em;
    color:var(--muted);text-transform:uppercase;
    padding:8px 18px 4px;
  }
  .sb-link{
    display:block;padding:7px 18px;
    color:var(--muted);font-size:.88rem;
    text-decoration:none;border-left:3px solid transparent;
    transition:all .18s;
  }
  .sb-link:hover,.sb-link.active{
    color:var(--accent2);
    border-left-color:var(--accent2);
    background:rgba(0,212,255,.06);
  }

  /* ── MAIN ── */
  #main{flex:1;padding:32px 36px 80px;max-width:960px;}

  /* ── SLIP CARD ── */
  .slip{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    margin-bottom:32px;
    overflow:hidden;
  }
  .slip-header{
    background:linear-gradient(135deg,var(--surface2),#1c1f35);
    border-bottom:1px solid var(--border);
    padding:18px 24px;
    display:flex;align-items:center;gap:12px;
    cursor:pointer;user-select:none;
  }
  .slip-badge{
    background:linear-gradient(135deg,var(--accent),#9c27b0);
    border-radius:8px;padding:4px 12px;
    font-size:.78rem;font-weight:700;color:#fff;
    white-space:nowrap;
  }
  .slip-title{font-size:1rem;font-weight:600;color:var(--text);}
  .slip-toggle{
    margin-left:auto;font-size:1.2rem;color:var(--muted);
    transition:transform .3s;
  }
  .slip.collapsed .slip-toggle{transform:rotate(-90deg);}
  .slip-body{padding:24px;display:block;}
  .slip.collapsed .slip-body{display:none;}

  /* ── QUESTION ── */
  .q-section{margin-bottom:24px;}
  .q-title{
    font-size:.82rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--accent2);
    margin-bottom:12px;padding-bottom:6px;
    border-bottom:1px solid var(--border);
  }
  .q-block{margin-bottom:20px;}
  .q-label{
    display:inline-block;
    background:var(--surface2);border:1px solid var(--border);
    border-radius:6px;padding:3px 10px;
    font-size:.82rem;font-weight:700;color:var(--orange);
    margin-bottom:8px;
  }
  .q-text{
    color:var(--muted);font-size:.88rem;
    margin-bottom:10px;font-style:italic;
  }

  /* ── CODE BLOCK ── */
  .code-wrap{
    position:relative;border-radius:10px;
    background:var(--code-bg);
    border:1px solid var(--border);
    overflow:hidden;margin-top:6px;
  }
  .code-header{
    background:#161b22;
    border-bottom:1px solid var(--border);
    padding:8px 14px;
    display:flex;align-items:center;gap:8px;
  }
  .code-lang{
    font-size:.73rem;font-weight:600;letter-spacing:.08em;
    color:var(--muted);text-transform:uppercase;
    background:var(--surface2);border-radius:4px;
    padding:2px 8px;
  }
  .code-filename{font-size:.78rem;color:#58a6ff;margin-left:4px;}
  .copy-btn{
    margin-left:auto;background:var(--surface2);
    border:1px solid var(--border);border-radius:6px;
    color:var(--muted);font-size:.73rem;padding:3px 10px;
    cursor:pointer;transition:all .18s;
  }
  .copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .copy-btn.copied{background:var(--green);color:#000;border-color:var(--green);}
  pre{
    padding:16px 18px;overflow-x:auto;
    font-family:'Cascadia Code','Fira Code','Consolas',monospace;
    font-size:.82rem;line-height:1.65;
    white-space:pre;
  }
  pre::-webkit-scrollbar{height:5px;}
  pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  /* ── SYNTAX COLOURS ── */
  .kw{color:#ff79c6;}
  .cm{color:#6272a4;font-style:italic;}
  .st{color:#f1fa8c;}
  .nm{color:#bd93f9;}
  .fn{color:#50fa7b;}
  .tp{color:#8be9fd;}
  .an{color:#ffb86c;}

  /* ── TAG PILLS ── */
  .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .tag{
    background:rgba(108,99,255,.15);
    border:1px solid rgba(108,99,255,.35);
    border-radius:20px;padding:2px 10px;
    font-size:.72rem;color:var(--accent);
  }

  /* ── BACK TO TOP ── */
  #btt{
    position:fixed;bottom:28px;right:28px;
    background:var(--accent);color:#fff;
    border:none;border-radius:50%;
    width:42px;height:42px;font-size:1.1rem;
    cursor:pointer;box-shadow:0 4px 20px rgba(108,99,255,.5);
    display:none;align-items:center;justify-content:center;
    transition:opacity .2s;z-index:99;
  }
  #btt.show{display:flex;}
  #btt:hover{opacity:.85;}

  /* ── PROGRESS BAR ── */
  #progress{
    position:fixed;top:0;left:0;height:3px;width:0;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    z-index:200;transition:width .1s;
  }

  /* ── SEARCH HIGHLIGHT ── */
  mark{background:#6c63ff44;color:var(--text);border-radius:2px;}

  @media(max-width:768px){
    #sidebar{display:none;}
    #main{padding:20px 16px 60px;}
    #topbar{padding:0 12px;}
  }
</style>

    String text = "Welcome To Java Programming   ";
    int x = 0;
    boolean left = true;

    public ScrollText() {
        setSize(400, 200);
        setVisible(true);
        Thread t = new Thread(this);
        t.start();
        addWindowListener(new WindowAdapter() {
            public void windowClosing(WindowEvent e) { dispose(); }
        });
    }

    public void paint(Graphics g) {
        g.drawString(text, x, 100);
    }

    public void run() {
        while (true) {
            if (left) { x += 5; if (x > 250) left = false; }
            else       { x -= 5; if (x < 0)   left = true;  }
            repaint();
            try { Thread.sleep(100); } catch (Exception e) {}
        }
    }

    public static void main(String[] args) { new ScrollText(); }

  q1b:{
    q:"Write a SERVLET program which counts how many times a user has visited a web page (Use Cookie).",
    files:[{lang:"java",name:"VisitCounter.java",code:`import java.io.*;
import javax.servlet.*;
import javax.servlet.http.*;

public class VisitCounter extends HttpServlet {
    public void doGet(HttpServletRequest req, HttpServletResponse res)
            throws ServletException, IOException {
        res.setContentType("text/html");
        PrintWriter out = res.getWriter();
        int count = 1;
        Cookie cookies[] = req.getCookies();
        if (cookies != null)
            for (Cookie c : cookies)
                if (c.getName().equals("visit"))
                    count = Integer.parseInt(c.getValue()) + 1;
        Cookie cookie = new Cookie("visit", String.valueOf(count));

// ═══════════════════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════════════════
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderCode(code, lang){
  // minimal keyword highlight
  let c = escapeHtml(code);
  // strings
  c = c.replace(/"([^"\\]|\\.)*"/g, m => `<span class="st">${m}</span>`);
  c = c.replace(/'([^'\\]|\\.)*'/g, m => `<span class="st">${m}</span>`);
  // comments
  c = c.replace(/(\/\/[^\n]*)/g, m => `<span class="cm">${m}</span>`);
  c = c.replace(/(\/\*[\s\S]*?\*\/)/g, m => `<span class="cm">${m}</span>`);
  // keywords
  const kws = ['public','private','protected','class','interface','extends',
    'implements','import','package','static','void','int','double','float',
    'boolean','char','String','long','short','byte','new','return','if','else',
    'while','for','try','catch','throw','throws','finally','super','this',
    'null','true','false','break','continue','synchronized','volatile',
    'abstract','final','native','transient','enum','instanceof',
    'switch','case','default','do'];
  kws.forEach(k => {
    c = c.replace(new RegExp(`\\b(${k})\\b`,'g'),
      `<span class="kw">$1</span>`);
  });
  return c;
}

function copyCode(btn){
  const pre = btn.closest('.code-wrap').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText || pre.textContent).then(()=>{
    btn.textContent='✓ Copied!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); },2000);
  });
}

function buildQ(key, slip){
  const qd = slip[key];
  if(!qd) return '';
  const label = key === 'q1a' ? 'A)' : key === 'q1b' ? 'B)' : key === 'q2a' ? 'A)' : 'B)';
  let html = `<div class="q-block">
    <span class="q-label">${label}</span>
    <p class="q-text">${escapeHtml(qd.q)}</p>`;
  qd.files.forEach(f => {
    html += `<div class="code-wrap">
      <div class="code-header">
        <span class="code-lang">${f.lang}</span>
        <span class="code-filename">${escapeHtml(f.name)}</span>
        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
      </div>
      <pre>${renderCode(f.code, f.lang)}</pre>
    </div>`;
  });
  if(qd.tags && qd.tags.length){
    html += `<div class="tag-row">${qd.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>`;
  }
  html += `</div>`;
  return html;
}

function buildSlip(slip){
  const id = `slip${slip.n}`;
  let html = `<div class="slip" id="${id}">
    <div class="slip-header" onclick="toggleSlip(this)">
      <span class="slip-badge">SLIP ${slip.n}</span>
      <span class="slip-title">Advanced Java &amp; Android – Slip ${slip.n}</span>
      <span class="slip-toggle">▾</span>
    </div>
    <div class="slip-body">`;

  // Q1
  if(slip.q1a || slip.q1b){
    html += `<div class="q-section"><div class="q-title">Q.1 — Advanced Java</div>`;
    html += buildQ('q1a', slip);
    html += buildQ('q1b', slip);
    html += `</div>`;
  }
  // Q2
  if(slip.q2a || slip.q2b){
    html += `<div class="q-section"><div class="q-title">Q.2 — Android</div>`;
    html += buildQ('q2a', slip);
    html += buildQ('q2b', slip);
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function toggleSlip(header){
  const slip = header.closest('.slip');
  slip.classList.toggle('collapsed');
}

// Build main content
const main = document.getElementById('main');
SLIPS.forEach(slip => {
  main.insertAdjacentHTML('beforeend', buildSlip(slip));
});

SLIPS.forEach(slip => {

  a.className = 'sb-link';

searchEl.addEventListener('input', function(){

    const el = document.getElementById(`slip${slip.n}`);

    const text = el.textContent.toLowerCase();

// ── BACK TO TOP ─────────────────────────────────────────────────
const btt = document.getElementById('btt');
window.addEventListener('scroll', ()=>{
  btt.classList.toggle('show', window.scrollY > 400);

  // progress bar
  const h = document.documentElement;
  const pct = (window.scrollY / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progress').style.width = pct + '%';

  // active sidebar
  let active = null;
  SLIPS.forEach(slip => {
    const el = document.getElementById(`slip${slip.n}`);
    if(el && el.getBoundingClientRect().top < 120) active = `slip${slip.n}`;
  });
  if(active){
    document.querySelectorAll('.sb-link').forEach(l=>{
      l.classList.toggle('active', l.getAttribute('href') === '#'+active);
    });
  }
});
btt.onclick = () => window.scrollTo({top:0,behavior:'smooth'});

</script>
